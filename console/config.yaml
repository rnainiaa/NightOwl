# Configuration de la console NightOwl

server:
  host: localhost
  port: 8443
  ssl_verify: false  # Désactiver la vérification SSL pour les certificats auto-signés

console:
  prompt: "nightowl> "
  history_file: ".console_history"
  log_level: "INFO"

# Couleurs et thème
colors:
  prompt: "cyan"
  success: "green"
  error: "red"
  warning: "yellow"
  info: "blue"

# Paramètres de session
session:
  timeout: 300  # 5 minutes
  max_history: 1000