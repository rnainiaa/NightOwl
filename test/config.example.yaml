# Configuration NightOwl C2 Server
# Copier en config.yaml et modifier selon besoins

server:
  host: 0.0.0.0
  port: 443
  ssl_enabled: true
  ssl_cert: certs/server.crt
  ssl_key: certs/server.key
  
  # Rotation des logs
  log_retention_days: 30
  max_log_size_mb: 100

database:
  # Type: sqlite ou postgresql
  type: sqlite
  path: data/nightowl.db
  
  # Pour PostgreSQL
  # host: localhost
  # port: 5432
  # name: nightowl
  # user: nightowl_user
  # password: change_this

security:
  # Clé de chiffrement pour les communications
  encryption_key: generate_secure_key_here
  
  # Authentification opérateurs
  operators:
    - username: redteam_admin
      password_hash: bcrypt_hash_here
      role: admin
    - username: analyst
      password_hash: bcrypt_hash_here
      role: user
  
  # JWT pour API
  jwt_secret: change_this_secret
  jwt_expiry_hours: 24

logging:
  level: INFO
  file: logs/nightowl.log
  console: true
  
  # Journalisation forensique
  forensic:
    enabled: true
    directory: logs/forensic/
    max_size_mb: 500

modules:
  # Modules activés/désactivés
  enabled:
    - reconnaissance
    - privilege_escalation
    - lateral_movement
    - persistence
    - defense_evasion
  
  # Restrictions
  dangerous_actions: false
  production_safe: true

client:
  # Configuration par défaut des agents
  beacon_interval_min: 30
  beacon_interval_max: 300
  jitter: 0.3
  
  # Timeouts
  command_timeout: 300
  connect_timeout: 30

api:
  # Interface web optionnelle
  enabled: false
  host: 127.0.0.1
  port: 8000
  cors_origins:
    - http://localhost:3000

# Paramètres légaux
legal:
  organization: "Votre Organisation"
  contact_email: "security@example.com"
  required_authorization: true
  max_session_duration: 8
  
  # Plages horaires autorisées
  allowed_hours:
    start: 09:00
    end: 18:00
    timezone: Europe/Paris

# Notification (optionnel)
notifications:
  email:
    enabled: false
    smtp_server: smtp.example.com
    smtp_port: 587
    username: alert@example.com
    password: change_this
    from_addr: nightowl@example.com
    to_addrs:
      - soc@example.com
      - redteam@example.com