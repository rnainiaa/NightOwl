# Configuration NightOwl C2 Server

server:
  host: 0.0.0.0
  port: 8443
  ssl_enabled: true
  ssl_cert: certs/server.crt
  ssl_key: certs/server.key
  
  # Rotation des logs
  log_retention_days: 7
  max_log_size_mb: 50

database:
  # Type: sqlite ou postgresql
  type: sqlite
  path: data/nightowl.db

security:
  # Clé de chiffrement pour les communications
  encryption_key: "change_this_to_secure_random_key"
  
  # Authentification opérateurs
  operators:
    - username: "admin"
      password_hash: "$2b$12$EixZaYVK1Xb8WbTfIOLT3.5PHB7uZ6VcJwJfKvYrWJgN2cYb5U6"  # password: admin
      role: admin
    - username: "operator"
      password_hash: "$2b$12$EixZaYVK1Xb8WbTfIOLT3.5PHB7uZ6VcJwJfKvYrWJgN2cYb5U6"  # password: operator
      role: user
  
  # JWT pour API
  jwt_secret: "change_this_to_secure_jwt_secret"
  jwt_expiry_hours: 24

logging:
  level: INFO
  file: logs/nightowl.log
  console: true
  
  # Journalisation forensique
  forensic:
    enabled: true
    directory: logs/forensic/
    max_size_mb: 100

modules:
  # Modules activés/désactivés
  enabled:
    - reconnaissance
    - privilege_escalation
    - lateral_movement
    - persistence
    - defense_evasion
  
  # Restrictions
  dangerous_actions: false
  production_safe: true

client:
  # Configuration par défaut des agents
  beacon_interval_min: 2
  beacon_interval_max: 5
  jitter: 0.2
  
  # Timeouts
  command_timeout: 60
  connect_timeout: 15

api:
  # Interface web optionnelle
  enabled: false
  host: 127.0.0.1
  port: 8000
  cors_origins:
    - http://localhost:3000

# Paramètres légaux
legal:
  organization: "Test Organization"
  contact_email: "security@test.org"
  required_authorization: true
  max_session_duration: 4
  
  # Plages horaires autorisées
  allowed_hours:
    start: "09:00"
    end: "18:00"
    timezone: "Europe/Paris"

# Configuration de la console NightOwl
console:
  # URL du serveur (prioritaire sur la configuration serveur)
  server_url: "https://localhost:8443"
  
  # Paramètres de connexion
  ssl_verify: false  # Désactiver la vérification SSL pour les certificats auto-signés
  timeout: 30
  
  # Interface utilisateur
  prompt: "nightowl> "
  history_file: ".console_history"
  log_level: "INFO"
  
  # Couleurs et thème
  colors:
    prompt: "cyan"
    success: "green"
    error: "red"
    warning: "yellow"
    info: "blue"
    
  # Paramètres de session
  session_timeout: 300  # 5 minutes
  max_history: 1000
  
  # Commandes par défaut
  default_commands:
    - "sessions list"
    - "help"
    - "status"